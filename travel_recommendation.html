<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>TravelBloom - Home</title>

</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">TravelBloom</div>
            <div class="nav-links">

                <a href="about.html">About Us</a>
